<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thailand 2026 | Ultimate Quest</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="slider-container" id="slider">
        <!-- Slides dynamically injected by app.js -->
    </div>

    <!-- Persistent Controls -->
    <div class="nav-controls">
        <div class="arrow" id="prevBtn" onclick="prevSlide()"><i data-lucide="chevron-left"></i></div>
        <div class="dots" id="dotGroup"></div>
        <div class="arrow" id="nextBtn" onclick="nextSlide()"><i data-lucide="chevron-right"></i></div>
    </div>

    <script src="./app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>

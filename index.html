<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thailand 2026 | Ultimate Quest</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="slider-container" id="slider">
        <!-- Main Slides will be injected here for easier management -->
    </div>

    <!-- Main Navigation Layers -->
    <div class="nav-arrows">
        <div class="arrow" id="prevBtn" onclick="prevSlide()"><i data-lucide="chevron-left"></i></div>
        <div class="arrow" id="nextBtn" onclick="nextSlide()"><i data-lucide="chevron-right"></i></div>
    </div>

    <div class="dot-container" id="dotGroup">
        <!-- Dots injected by JS -->
    </div>

    <!-- Navigation Hint -->
    <div id="nav-hint" style="position: fixed; top: 20px; right: 20px; font-weight: 800; color: var(--primary); font-size: 0.8rem; background: #fff; padding: 10px 20px; border-radius: 50px; box-shadow: var(--shadow); z-index: 1001; animation: slideIn 0.5s;">
        USE ARROWS OR KEYS TO EXPLORE →
    </div>

    <script src="./app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
